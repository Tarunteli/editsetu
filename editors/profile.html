<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title id="pageTitle">Editor Profile | EditSetu</title>

<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/editor.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<section class="editor-profile">

<a href="../editors.html" class="back-btn">
<i class="fas fa-arrow-left"></i>
Back to Editors
</a>

<div class="editor-header">

<div class="editor-avatar" id="avatar">
</div>

<h1 id="editorName"></h1>

<p id="editorCategory"></p>

<div class="editor-rating" id="editorRating"></div>

</div>

<div class="editor-card-box">

<h2>
<i class="fas fa-user"></i>
About Me
</h2>

<p id="editorAbout"></p>

</div>

<div class="editor-card-box">

<h2>
<i class="fas fa-briefcase"></i>
Experience
</h2>

<div id="experienceList"></div>

</div>

<div class="editor-card-box">

<h2>
<i class="fas fa-tools"></i>
Skills
</h2>

<div class="skills" id="skillsList"></div>

</div>

<div class="editor-card-box">

<h2>
<i class="fas fa-layer-group"></i>
Services
</h2>

<div class="skills" id="servicesList"></div>

</div>

<div class="editor-card-box">

<h2>
<i class="fas fa-video"></i>
Portfolio
</h2>

<div class="portfolio-grid" id="portfolioList"></div>

</div>

<div class="editor-card-box">

<h2>
<i class="fas fa-indian-rupee-sign"></i>
Pricing
</h2>

<p class="price" id="editorPrice"></p>

</div>

<div class="editor-card-box" style="text-align:center">

<h2>Let's Work Together</h2>

<p>
Contact this editor directly on WhatsApp.
</p>

<a id="whatsappBtn"
class="whatsapp-btn"
target="_blank">

<i class="fab fa-whatsapp"></i>

Contact on WhatsApp

</a>

</div>

</section>

<script src="../assets/js/editor.js"></script>
<script src="../assets/js/profile.js"></script>

</body>
</html>
